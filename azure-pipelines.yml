trigger:
  branches:
    include:
      - main
      - dev

variables:
  ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
    - group: gradtracker-prod-vars
    - name: ENV
      value: prod
    - name: VAULT
      value: GradTracker-prod-kv
    - name: AGENT
      value: gradtracker-prod-agent
  ${{ if eq(variables['Build.SourceBranchName'], 'dev') }}:
    - group: gradtracker-dev-vars
    - name: ENV
      value: dev
    - name: VAULT
      value: GradTracker-dev-kv
    - name: AGENT
      value: gradtracker-dev-agent

pool:
  name: gradtracker-agents
  demands:
    - agent.name -equals $(AGENT)

stages:

  - stage: Build
    displayName: 'Build Next.js App'
    jobs:
      - job: BuildJob
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Use Node.js 20'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run build
            displayName: 'Build app'
            env:
              NEXT_PUBLIC_SUPABASE_URL: $(SUPABASE-URL)
              NEXT_PUBLIC_SUPABASE_ANON_KEY: $(SUPABASE-ANON-KEY)

          - task: CopyFiles@2
            displayName: 'Stage build artifacts'
            inputs:
              contents: |
                .next/**
                public/**
                package.json
                package-lock.json
                next.config.js
              targetFolder: $(Build.ArtifactStagingDirectory)

          - task: PublishBuildArtifacts@1
            displayName: 'Publish artifacts'
            inputs:
              artifactName: 'gradtracker-build'

  - stage: Deploy
    displayName: 'Deploy to $(ENV)'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy to $(ENV) VM'
        environment: $(ENV)
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    export SUPABASE_URL=$(az keyvault secret show \
                      --vault-name $(VAULT) \
                      --name SUPABASE-URL \
                      --query value -o tsv)

                    export SUPABASE_ANON_KEY=$(az keyvault secret show \
                      --vault-name $(VAULT) \
                      --name SUPABASE-ANON-KEY \
                      --query value -o tsv)

                    export ANTHROPIC_API_KEY=$(az keyvault secret show \
                      --vault-name $(VAULT) \
                      --name ANTHROPIC-API-KEY \
                      --query value -o tsv)

                    export NEXTAUTH_SECRET=$(az keyvault secret show \
                      --vault-name $(VAULT) \
                      --name NEXTAUTH-SECRET \
                      --query value -o tsv)

                    sudo mkdir -p /var/www/gradtracker
                    sudo cp -r $(Pipeline.Workspace)/gradtracker-build/. /var/www/gradtracker/
                    cd /var/www/gradtracker
                    npm ci --omit=dev

                    pm2 stop gradtracker || true
                    pm2 delete gradtracker || true
                    pm2 start npm --name "gradtracker" -- start
                    pm2 save
                  displayName: 'Deploy and restart app'