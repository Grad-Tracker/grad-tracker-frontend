sonar.projectKey=Grad-Tracker_grad-tracker-frontend
sonar.organization=grad-tracker
sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/*.d.ts,**/*.config.*,src/components/ui/**

# Keep this list in sync with the `coverage.exclude` array in vitest.config.ts
# so the SonarCloud coverage gate matches the locally-measured coverage.
sonar.coverage.exclusions=\
    **/node_modules/**,\
    **/.next/**,\
    **/dist/**,\
    **/coverage/**,\
    **/*.d.ts,\
    **/*.config.*,\
    next.config.*,\
    src/components/ui/**,\
    src/lib/supabase/queries/shared-plans.ts,\
    src/__tests__/**,\
    **/*.test.ts,\
    **/*.test.tsx,\
    src/components/**/*.test.tsx,\
    src/proxy.ts,\
    src/types/**,\
    src/app/auth/**/route.ts,\
    src/app/**/layout.tsx,\
    src/lib/supabase/client.ts,\
    src/lib/supabase/server.ts,\
    src/lib/supabase/admin.ts,\
    src/lib/supabase/queries/view-types.ts,\
    src/utils/supabase/**

sonar.sourceEncoding=UTF-8
